name: pdf-cover-generator
services:
  pdf-cover-generator:
    image: ghcr.io/dnau1973-hash/pdf-cover-generator:latest
    container_name: pdf-cover-generator
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Europe/London
    ports:
      - target: 3001
        published: "3001"
        protocol: tcp
    volumes:
      - type: bind
        source: /media/Series/Books/bande_dessinee/Adultes
        target: /usr/src/app/Media
    restart: unless-stopped
    x-casaos:
      envs: []
      ports:
        - container: "3001"
          description:
            en_us: Web UI port
            fr_fr: Port de l'interface web      

# --- LE BLOC MAGIQUE POUR LA BOUTIQUE ZIMAOS ---
x-casaos:
  architectures:
    - amd64
    - arm64
  main: pdf-cover-generator
  description:
    en_us: "A lightweight web app to extract the first page of PDFs (Comics/eBooks) as PNG covers. Preserves aspect ratio automatically."
    fr_fr: "Générateur de couvertures PNG à partir de fichiers PDF locaux. Idéal pour illustrer votre bibliothèque de médias."
  tagline:
    en_us: "PDF Cover Generator"
    fr_fr: "Générateur de Couvertures PDF"
  developer: "NAU David"
  author: "Ton Pseudo"
  icon: https://cdn-icons-png.flaticon.com/512/337/337946.png
  thumbnail: https://cdn-icons-png.flaticon.com/512/337/337946.png
  title:
    en_us: PDF Cover Generator
  category: Utilities
  port_map: "3001"